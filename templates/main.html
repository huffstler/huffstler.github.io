<!--
    This is the default page template.

    In soupault's terminology, a "page template" is simply an HTML file devoid of content.
    It parses HTML into an element tree much like browsers do and then modifies it,
    then saves modified HTML to a static page.
  -->
<html>
  <head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="fediverse:creator" content="@scrambo@mastodon.social" />

	<link href="https://github.com/huffstler" rel="me"/>
	<link rel="alternate" type="application/atom+xml" title="Atom Feed" href="https://huffstler.github.io/blog/atom.xml">

	<link
		href="https://cdn.jsdelivr.net/npm/sakura.css/css/sakura-earthly.css"
		media="screen and (prefers-color-scheme: light)"
		rel="stylesheet"
	/>
	<link
		href="https://cdn.jsdelivr.net/npm/sakura.css/css/sakura-dark.css"
		media="screen and (prefers-color-scheme: dark)"
		rel="stylesheet"
	/>

	<!-- <meta name="theme-color" content="#ff00ff"> -->
	<script src="/script.js"> </script>

    <!-- Page title is set by the title widget based on its heading -->
    <title> </title>
  </head>
  <body>
    <main>
      <!--
        Page content is inserted here.
        It can be inserted inside any element identifiable with a CSS3 selector,
        see the settings.default_content_selector option.
      -->
    </main>
  </body>
</html>
